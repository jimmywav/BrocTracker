<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">

<meta name="theme-color" content="#fef9c3">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fef9c3;
    --bg2: #fef3a0;
    --surface: #fffef5;
    --surface2: #faf6dd;
    --green: #3d9e4a;
    --green-light: #cff0d4;
    --red: #d94f3a;
    --red-light: #fdddd8;
    --amber: #e09020;
    --amber-light: #fdecc8;
    --text: #2a2208;
    --text-dim: #9a8e5a;
    --text-faint: #e8e2b8;
    --shadow: rgba(60,50,10,0.10);
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
  }

  /* =================== APP SHELL =================== */
  #app {
    width: 100%;
    max-width: 390px;
    height: 100vh;
    height: 100dvh;
    position: relative;
    overflow: hidden;
    background: var(--bg);
  }

  /* =================== MAIN SCREEN =================== */
  #main-screen {
    position: absolute;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 56px 32px 32px;
    z-index: 1;
  }

  .top-row {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0;
    position: absolute;
    top: 20px;
    left: 32px;
    right: 32px;
    width: calc(100% - 64px);
  }

  .icon-btn {
    width: 40px; height: 40px; border-radius: 14px;
    background: var(--surface); border: 1.5px solid var(--text-faint);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; box-shadow: 0 2px 6px var(--shadow);
    cursor: pointer; user-select: none;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .icon-btn:active { transform: scale(0.93); box-shadow: none; }

  .app-name {
    font-size: 12px; font-weight: 800; color: var(--text-dim);
    letter-spacing: 0.12em; text-transform: uppercase;
  }

  .main-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin-top: 20px;
  }

  .date-label {
    font-size: 11px; font-weight: 800; color: var(--text-dim);
    letter-spacing: 0.12em; text-transform: uppercase;

<body>
<div id="app">

<script>
// =================== STATE ===================
const STORAGE_KEY = 'broc-state';

function getDefaultState() {
  return {
    date: todayStr(),
    today: 0,
    goal: null,
    history: []
  };
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return getDefaultState();
    return JSON.parse(raw);
  } catch(e) {
    return getDefaultState();
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// =================== INIT ===================
let state = loadState();

// Daily rollover check
function checkRollover() {
  const today = todayStr();
  if (state.date !== today) {
    // archive previous day(s)
    // if multiple days missed, fill with 0s
    const prev = new Date(state.date);
    const now = new Date(today);
    let cursor = new Date(prev);
    while (cursor < now) {
      const ds = `${cursor.getFullYear()}-${String(cursor.getMonth()+1).padStart(2,'0')}-${String(cursor.getDate()).padStart(2,'0')}`;
      const count = (ds === state.date) ? state.today : 0;
      state.history.unshift({ date: ds, count, goal: state.goal });
      cursor.setDate(cursor.getDate() + 1);
    }
    state.today = 0;
    state.date = today;
    saveState();
  }
}

checkRollover();

// =================== DOM REFS ===================
const heroCount     = document.getElementById('hero-count');
const dateLabel     = document.getElementById('date-label');
const btnPlus       = document.getElementById('btn-plus');
const btnMinus      = document.getElementById('btn-minus');
const swipeHint     = document.getElementById('swipe-hint');
const historyPanel  = document.getElementById('history-panel');
const panelDrag     = document.getElementById('panel-drag');
const settingsScreen= document.getElementById('settings-screen');
const settingsBtn   = document.getElementById('settings-btn');
const backBtn       = document.getElementById('back-btn');
const goalInput     = document.getElementById('goal-input');
const exportBtn     = document.getElementById('export-btn');
const importBtn     = document.getElementById('import-btn');
const fileInput     = document.getElementById('file-input');
const resetBtn      = document.getElementById('reset-btn');
const dialogOverlay = document.getElementById('dialog-overlay');
const dialogCancel  = document.getElementById('dialog-cancel');
const dialogConfirm = document.getElementById('dialog-confirm');
const chartWrap     = document.getElementById('chart-wrap');
const statsGrid     = document.getElementById('stats-grid');
const toast         = document.getElementById('toast');

// =================== RENDER ===================
function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-AU', { weekday:'short', day:'numeric', month:'short' });
}

function renderMain() {
  heroCount.textContent = state.today;

  const d = new Date(state.date + 'T00:00:00');
  dateLabel.textContent = d.toLocaleDateString('en-AU', { weekday:'short', day:'numeric', month:'short' }).toUpperCase();
}

// =================== COUNTER ===================
function bump() {
  heroCount.classList.remove('bump');
  void heroCount.offsetWidth;
  heroCount.classList.add('bump');
  setTimeout(() => heroCount.classList.remove('bump'), 120);
}

btnPlus.addEventListener('click', () => {
  state.today += 1;
  saveState();
  renderMain();
  bump();
});

btnMinus.addEventListener('click', () => {
  if (state.today > 0) {
    state.today -= 1;
    saveState();
    renderMain();
    bump();
  }
});

// =================== HISTORY PANEL ===================
let panelOpen = false;
let activeRange = 7;

function openHistory() {
  panelOpen = true;
  historyPanel.classList.add('open');
  renderHistory();
}

function closeHistory() {
  panelOpen = false;
  historyPanel.classList.remove('open');
}

swipeHint.addEventListener('click', openHistory);

// drag to close
let dragStartY = null;
let dragCurrentY = null;

panelDrag.addEventListener('touchstart', (e) => {
  dragStartY = e.touches[0].clientY;
}, { passive: true });

panelDrag.addEventListener('touchmove', (e) => {
  dragCurrentY = e.touches[0].clientY;
  const delta = dragCurrentY - dragStartY;
  if (delta > 0) {
    historyPanel.style.transition = 'none';
    historyPanel.style.transform = `translateY(${delta}px)`;
  }
}, { passive: true });

panelDrag.addEventListener('touchend', () => {
  const delta = (dragCurrentY || 0) - (dragStartY || 0);
  historyPanel.style.transition = '';
  historyPanel.style.transform = '';
  if (delta > 80) {
    closeHistory();
  }
  dragStartY = null;
  dragCurrentY = null;
});

// range tabs
document.querySelectorAll('.range-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.range-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const r = tab.dataset.range;
    activeRange = r === 'all' ? 'all' : parseInt(r);
    renderHistory();
  });
});

function getFilteredHistory() {
  const hist = state.history;
  if (activeRange === 'all') return hist;
  return hist.slice(0, activeRange);
}

function renderHistory() {
  renderChart();
  renderStats();
}

function renderChart() {
  const hist = getFilteredHistory();
  chartWrap.innerHTML = '';

  if (hist.length === 0 && state.today === 0) {
    chartWrap.innerHTML = '<div style="width:100%;display:flex;align-items:center;justify-content:center;height:100%;font-size:13px;font-weight:700;color:var(--text-dim)">No data yet</div>';
    return;
  }

  // build display set: history (oldest→newest) + today
  const displayed = [...hist].reverse();
  displayed.push({ date: state.date, count: state.today, goal: state.goal, isToday: true });
  const slice = displayed;

  if (activeRange === 'all' && slice.length > 7) {
    renderLineChart(slice);
  } else {
    renderBarChart(slice);
  }
}

function renderBarChart(slice) {
  const maxCount = Math.max(...slice.map(d => d.count), state.goal || 0, 1);
  const barAreaH = 110;

  if (state.goal != null) {
    const goalPct = Math.min((state.goal / maxCount) * 100, 100);
    const bottomPx = (goalPct / 100) * barAreaH;
    const overlay = document.createElement('div');
    overlay.className = 'goal-line-overlay';
    overlay.style.bottom = (bottomPx + 20) + 'px';
    overlay.style.left = '0';
    overlay.style.right = '0';
    overlay.innerHTML = `<div class="goal-line-rule"></div><div class="goal-line-label">goal ${state.goal}</div>`;
    chartWrap.style.position = 'relative';
    chartWrap.appendChild(overlay);
  }

  slice.forEach(entry => {
    const col = document.createElement('div');
    col.className = 'chart-bar-col';

    const pct = maxCount > 0 ? (entry.count / maxCount) * 100 : 0;
    const bar = document.createElement('div');
    bar.style.height = Math.max(pct, entry.count > 0 ? 3 : 0) + '%';

    if (entry.isToday) {
      bar.className = 'bar today';
    } else if (state.goal != null && entry.count > entry.goal) {
      bar.className = 'bar over';
    } else {
      bar.className = 'bar under';
    }

    const label = document.createElement('div');
    label.className = 'bar-day';
    const d = new Date(entry.date + 'T00:00:00');
    label.textContent = d.toLocaleDateString('en-AU', { weekday: 'short' }).slice(0,1).toUpperCase();

    col.appendChild(bar);
    if (slice.length <= 7) col.appendChild(label);
    chartWrap.appendChild(col);
  });
}

function renderLineChart(slice) {
  const W = chartWrap.clientWidth || 300;
  const H = 130;
  const PAD = { top: 12, right: 32, bottom: 20, left: 4 };
  const plotW = W - PAD.left - PAD.right;
  const plotH = H - PAD.top - PAD.bottom;

  const maxCount = Math.max(...slice.map(d => d.count), state.goal || 0, 1);

  const xScale = (i) => PAD.left + (i / (slice.length - 1)) * plotW;
  const yScale = (v) => PAD.top + plotH - (v / maxCount) * plotH;

  // build smooth path points
  const pts = slice.map((d, i) => ({ x: xScale(i), y: yScale(d.count) }));

  // catmull-rom to cubic bezier
  function toCurve(points) {
    if (points.length < 2) return '';
    let d = `M ${points[0].x},${points[0].y}`;
    for (let i = 0; i < points.length - 1; i++) {
      const p0 = points[Math.max(i - 1, 0)];
      const p1 = points[i];
      const p2 = points[i + 1];
      const p3 = points[Math.min(i + 2, points.length - 1)];
      const cp1x = p1.x + (p2.x - p0.x) / 6;
      const cp1y = p1.y + (p2.y - p0.y) / 6;
      const cp2x = p2.x - (p3.x - p1.x) / 6;
      const cp2y = p2.y - (p3.y - p1.y) / 6;
      d += ` C ${cp1x},${cp1y} ${cp2x},${cp2y} ${p2.x},${p2.y}`;
    }
    return d;
  }

  const linePath = toCurve(pts);
  const areaPath = linePath + ` L ${pts[pts.length-1].x},${H - PAD.bottom} L ${pts[0].x},${H - PAD.bottom} Z`;

  // month labels — first day of each month visible
  const monthLabels = [];
  let lastMonth = -1;
  slice.forEach((d, i) => {
    const dt = new Date(d.date + 'T00:00:00');
    if (dt.getMonth() !== lastMonth) {
      lastMonth = dt.getMonth();
      monthLabels.push({ x: xScale(i), label: dt.toLocaleDateString('en-AU', { month: 'short' }) });
    }
  });

  // over-goal dots
  const overDots = slice
    .map((d, i) => ({ ...d, i }))
    .filter(d => !d.isToday && d.goal != null && d.count > d.goal);

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', '100%');
  svg.setAttribute('height', H);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.style.overflow = 'visible';

  // defs for gradient
  svg.innerHTML = `
    <defs>
      <linearGradient id="lineAreaGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#e09020" stop-opacity="0.22"/>
        <stop offset="100%" stop-color="#e09020" stop-opacity="0.02"/>
      </linearGradient>
    </defs>
    <!-- area fill -->
    <path d="${areaPath}" fill="url(#lineAreaGrad)"/>
    ${state.goal != null ? `
      <!-- goal line -->
      <line x1="${PAD.left}" y1="${yScale(state.goal)}" x2="${W - PAD.right}" y2="${yScale(state.goal)}"
        stroke="#d94f3a" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
      <text x="${W - PAD.right + 3}" y="${yScale(state.goal) + 3}"
        font-size="8" font-weight="800" fill="#d94f3a" opacity="0.7"
        font-family="Nunito,sans-serif">goal</text>
    ` : ''}
    <!-- line -->
    <path d="${linePath}" fill="none" stroke="#e09020" stroke-width="2.5"
      stroke-linecap="round" stroke-linejoin="round"/>
    <!-- over-goal dots -->
    ${overDots.map(d => `<circle cx="${xScale(d.i)}" cy="${yScale(d.count)}" r="3.5" fill="#d94f3a" opacity="0.85"/>`).join('')}
    <!-- today dot -->
    <circle cx="${xScale(slice.length-1)}" cy="${yScale(slice[slice.length-1].count)}" r="4" fill="#e09020" stroke="#fffef5" stroke-width="2"/>
    <!-- month labels -->
    ${monthLabels.map(m => `<text x="${m.x}" y="${H}" font-size="8" font-weight="800" fill="#9a8e5a" font-family="Nunito,sans-serif" text-anchor="middle">${m.label}</text>`).join('')}
  `;

  chartWrap.style.height = H + 'px';
  chartWrap.appendChild(svg);
}

function renderStats() {
  const hist = getFilteredHistory();
  statsGrid.innerHTML = '';

  const allEntries = hist; // completed days only (not today)

  if (allEntries.length === 0) {
    statsGrid.innerHTML = '<div class="no-goal-note" style="grid-column:1/-1">Log a few days to see stats</div>';
    return;
  }

  // avg/day
  const avg = allEntries.reduce((s,e) => s + e.count, 0) / allEntries.length;

  // 7-day trend: compare avg of last 7 vs prev 7
  let trendHTML = '—';
  let trendClass = 'neutral';
  if (allEntries.length >= 2) {
    const recent = allEntries.slice(0, Math.min(7, allEntries.length));
    const older  = allEntries.slice(Math.min(7, allEntries.length), Math.min(14, allEntries.length));
    const recentAvg = recent.reduce((s,e)=>s+e.count,0)/recent.length;
    if (older.length > 0) {
      const olderAvg = older.reduce((s,e)=>s+e.count,0)/older.length;
      const diff = recentAvg - olderAvg;
      trendHTML = (diff >= 0 ? '↑ +' : '↓ ') + Math.abs(diff).toFixed(1);
      trendClass = diff > 0 ? 'up' : 'down';
    } else {
      trendHTML = recentAvg.toFixed(1);
    }
  }

  // best day (lowest non-zero, or lowest overall)
  const nonZero = allEntries.filter(e => e.count > 0);
  const bestCount = nonZero.length > 0
    ? Math.min(...nonZero.map(e=>e.count))
    : Math.min(...allEntries.map(e=>e.count));

  // days over goal
  const daysOverGoal = state.goal != null
    ? allEntries.filter(e => e.goal != null && e.count > e.goal).length
    : null;

  const cards = [
    { value: avg.toFixed(1), label: 'Avg / day', cls: '' },
    { value: trendHTML, label: '7-day trend', cls: trendClass },
    { value: bestCount, label: 'Best day', cls: '' },
  ];

  if (daysOverGoal !== null) {
    cards.push({ value: daysOverGoal, label: 'Days over goal', cls: daysOverGoal > 0 ? 'up' : '' });
  }

  cards.forEach(c => {
    const card = document.createElement('div');
    card.className = 'stat-card';
    card.innerHTML = `<div class="stat-value ${c.cls}">${c.value}</div><div class="stat-label">${c.label}</div>`;
    statsGrid.appendChild(card);
  });
}

// =================== SETTINGS ===================
function openSettings() {
  goalInput.value = state.goal != null ? state.goal : '';
  settingsScreen.classList.add('open');
}

function closeSettings() {
  // save goal on close
  const val = goalInput.value.trim();
  if (val === '' || isNaN(parseInt(val))) {
    state.goal = null;
  } else {
    state.goal = Math.max(0, parseInt(val));
  }
  saveState();
  settingsScreen.classList.remove('open');
}

settingsBtn.addEventListener('click', openSettings);
backBtn.addEventListener('click', closeSettings);

// =================== EXPORT ===================
exportBtn.addEventListener('click', () => {
  const json = JSON.stringify(state, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `broc-tracker-${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
});

// =================== IMPORT ===================
importBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', () => {
  const file = fileInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const parsed = JSON.parse(e.target.result);
      // validate shape
      if (
        typeof parsed.date !== 'string' ||
        typeof parsed.today !== 'number' ||
        !Array.isArray(parsed.history)
      ) {
        throw new Error('Invalid format');
      }
      state = parsed;
      saveState();
      renderMain();
      showToast('Data imported ✓');
    } catch(err) {
      showToast('Invalid file — not imported');
    }
    fileInput.value = '';
  };
  reader.readAsText(file);
});

// =================== RESET ===================
resetBtn.addEventListener('click', () => {
  showDialog(
    'Reset all data?',
    'This will permanently delete your history and settings.',
    () => {
      localStorage.removeItem(STORAGE_KEY);
      state = getDefaultState();
      saveState();
      renderMain();
      goalInput.value = '';
      showToast('Data reset');
    }
  );
});

// =================== DIALOG ===================
let dialogCallback = null;

function showDialog(title, sub, onConfirm) {
  document.getElementById('dialog-title').textContent = title;
  document.getElementById('dialog-sub').textContent = sub;
  dialogCallback = onConfirm;
  dialogOverlay.classList.add('show');
}

function hideDialog() {
  dialogOverlay.classList.remove('show');
  dialogCallback = null;
}

dialogCancel.addEventListener('click', hideDialog);
dialogConfirm.addEventListener('click', () => {
  if (dialogCallback) dialogCallback();
  hideDialog();
});
dialogOverlay.addEventListener('click', (e) => {
  if (e.target === dialogOverlay) hideDialog();
});

// =================== TOAST ===================
let toastTimer = null;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
}

// =================== SWIPE GESTURE ON MAIN SCREEN ===================
let touchStartY = null;

document.getElementById('main-screen').addEventListener('touchstart', (e) => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });

document.getElementById('main-screen').addEventListener('touchend', (e) => {
  if (touchStartY === null) return;
  const delta = touchStartY - e.changedTouches[0].clientY;
  if (delta > 60 && !panelOpen) {
    openHistory();
  }
  touchStartY = null;
}, { passive: true });


// =================== KICK OFF ===================
renderMain();
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
  }
</script>
